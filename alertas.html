<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas - Fitoscents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/ui.css">
    <link rel="stylesheet" href="assets/css/features.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script type="module" src="assets/js/firebase.js"></script>
    <script src="components/header.js"></script>
</head>
<body>

<div class="container mt-4 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>🔔 Centro de Alertas</h2>
            <p class="text-muted mb-0">Notificaciones importantes de tu negocio</p>
        </div>
        <span class="badge bg-danger fs-5" id="total-alertas-badge">0 alertas</span>
    </div>

    <!-- KPI counters -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card h-100" style="border: 1px solid rgba(248,113,113,0.4); background: rgba(248,113,113,0.06);">
                <div class="card-body text-center">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
                    <h3 class="fw-bold text-danger mb-0 mt-2" id="count-criticas">0</h3>
                    <small class="text-muted">Críticas</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100" style="border: 1px solid rgba(255,215,0,0.4); background: rgba(255,215,0,0.06);">
                <div class="card-body text-center">
                    <i class="bi bi-exclamation-circle-fill fs-1" style="color: var(--gold-flat);"></i>
                    <h3 class="fw-bold mb-0 mt-2" style="color: var(--gold-flat);" id="count-importantes">0</h3>
                    <small class="text-muted">Importantes</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100" style="border: 1px solid rgba(56,189,248,0.4); background: rgba(56,189,248,0.06);">
                <div class="card-body text-center">
                    <i class="bi bi-info-circle-fill text-info fs-1"></i>
                    <h3 class="fw-bold text-info mb-0 mt-2" id="count-info">0</h3>
                    <small class="text-muted">Informativas</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100" style="border: 1px solid rgba(74,222,128,0.4); background: rgba(74,222,128,0.06);">
                <div class="card-body text-center">
                    <i class="bi bi-check-circle-fill text-success fs-1"></i>
                    <h3 class="fw-bold text-success mb-0 mt-2" id="count-resueltas">0</h3>
                    <small class="text-muted">Resueltas</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="btn-group w-100" role="group">
                <button type="button" class="btn btn-outline-secondary active"
                        onclick="setFiltroAlerta('todas', this)">
                    Todas (<span id="count-todas">0</span>)
                </button>
                <button type="button" class="btn btn-outline-danger"
                        onclick="setFiltroAlerta('critica', this)">🔴 Críticas</button>
                <button type="button" class="btn btn-outline-warning"
                        onclick="setFiltroAlerta('importante', this)">🟡 Importantes</button>
                <button type="button" class="btn btn-outline-info"
                        onclick="setFiltroAlerta('info', this)">🔵 Informativas</button>
            </div>
        </div>
    </div>

    <div id="alertas-container"></div>

    <div id="sin-alertas" class="card shadow text-center p-5" style="display: none;">
        <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
        <h3 class="mt-3 text-success">¡Todo en orden!</h3>
        <p class="text-muted">No hay alertas pendientes en este momento</p>
    </div>

</div>

<script src="assets/js/storage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/sales.js"></script>
<script src="assets/js/alertas.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await initApp();
        generarAlertas();
    });
</script>
</body>
</html>
