<!DOCTYPE html>
<html lang="es">
<head>
    <script src="assets/js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitoscents - Lista de Decants</title>
    <script src="assets/js/config.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/ui.css">
    <link rel="stylesheet" href="assets/css/features.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        /* ── CARD ── */
        .decant-card-preview {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 16px;
            transition: transform .15s, box-shadow .15s;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 0;
            overflow: hidden;
            padding: 0 !important;
        }
        .decant-card-preview:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.5) !important; }

        /* ── FOTO CUADRADA IZQUIERDA ── */
        .card-img-col {
            flex: 0 0 110px;
            width: 110px;
            min-height: 110px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 14px 0 0 14px;
        }
        .card-img-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-img-placeholder {
            color: #444;
            font-size: 2rem;
            text-align: center;
            line-height: 1;
            padding: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #555;
            letter-spacing: .05em;
        }

        /* ── CONTENIDO DERECHO ── */
        .card-body-col {
            flex: 1 1 0;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        /* ── TAGS ROW ── */
        .card-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 6px;
        }

        /* ── TAGS ── */
        .tag-badge { display:inline-block; font-size:0.72rem; padding:3px 10px; border-radius:20px; font-weight:600; margin:0; }
        .tag-diario   { background:rgba(108,117,125,.25); color:#adb5bd; border:1px solid #6c757d; }
        .tag-oficina  { background:rgba(13,110,253,.2);  color:#6ea8fe; border:1px solid #0d6efd; }
        .tag-cita     { background:rgba(214,51,132,.2);  color:#f1afd0; border:1px solid #d63384; }
        .tag-noche    { background:rgba(111,66,193,.25); color:#d0b4fe; border:1px solid #6f42c1; }
        .tag-club     { background:rgba(220,53,69,.2);   color:#f5a1a8; border:1px solid #dc3545; }
        .tag-casual   { background:rgba(25,135,84,.2);   color:#75c896; border:1px solid #198754; }
        .tag-deporte  { background:rgba(13,202,240,.2);  color:#6edff6; border:1px solid #0dcaf0; }
        .tag-todo     { background:rgba(255,193,7,.2);   color:#ffda6a; border:1px solid #ffc107; }
        .tag-invierno { background:rgba(13,110,253,.2);  color:#9ec5fe; border:1px solid #0d6efd; }
        .tag-verano   { background:rgba(255,193,7,.2);   color:#ffe69c; border:1px solid #ffc107; }
        .tag-primavera{ background:rgba(25,135,84,.2);   color:#75c896; border:1px solid #198754; }
        .tag-otono    { background:rgba(253,126,20,.2);  color:#feb272; border:1px solid #fd7e14; }

        /* ── CHECKLIST PILL BUTTONS ── */
        .ocas-check,.temp-check,.intens-check { display:none; }
        .ocas-label,.temp-label,.intens-label {
            cursor:pointer; border:1px solid #444; border-radius:20px;
            padding:4px 12px; font-size:0.78rem; user-select:none;
            transition:all .15s; margin:2px; display:inline-block;
        }
        .ocas-check:checked + .ocas-label,
        .temp-check:checked + .temp-label,
        .intens-check:checked + .intens-label {
            background:rgba(201,168,76,.3); border-color:#c9a84c; color:#ffd966; font-weight:700;
        }

        /* ── TALLAS TABLE ── */
        .tallas-table { width:100%; border-collapse:separate; border-spacing:0 6px; }
        .tallas-table thead th {
            font-size:0.78rem; font-weight:700; text-transform:uppercase;
            color:#adb5bd; padding:4px 10px; letter-spacing:.04em;
        }
        .tallas-table tbody tr { background:#1a1a2e; border-radius:8px; }
        .tallas-table tbody td { padding:6px 8px; vertical-align:middle; }
        .tallas-table tbody tr td:first-child { border-radius:8px 0 0 8px; }
        .tallas-table tbody tr td:last-child  { border-radius:0 8px 8px 0; }
        .talla-input {
            background:#0d0d1a; border:1px solid #333; color:#fff;
            border-radius:6px; padding:5px 10px; width:100%; font-size:0.88rem;
        }
        .talla-input:focus { outline:none; border-color:#c9a84c; box-shadow:0 0 0 2px rgba(201,168,76,.25); }
        .talla-input::placeholder { color:#555; }
        .precio-prefix { display:flex; align-items:center; gap:4px; }
        .precio-prefix span { color:#adb5bd; font-size:0.88rem; padding-left:6px; }
        .btn-del-talla {
            background:none; border:none; color:#c0392b;
            font-size:1rem; cursor:pointer; padding:4px 6px; opacity:.7; transition:opacity .15s;
        }
        .btn-del-talla:hover { opacity:1; }
        .btn-add-talla {
            background:rgba(201,168,76,.12); border:1px dashed #c9a84c;
            color:#ffd966; border-radius:8px; padding:6px 16px;
            font-size:0.82rem; cursor:pointer; transition:all .15s; width:100%; margin-top:4px;
        }
        .btn-add-talla:hover { background:rgba(201,168,76,.22); }

        /* ── TALLA PILL ── */
        .talla-pill {
            display:inline-block; background:#c9a84c; color:#1a1a2e;
            font-weight:700; font-size:0.82rem; padding:5px 14px;
            border-radius:30px; margin:3px 3px 3px 0; letter-spacing:.02em;
        }
        .talla-pill.inactiva { background:#333; color:#777; text-decoration:line-through; }

        /* ── MISC ── */
        .intensidad-bar { height:8px; border-radius:4px; background:#222; overflow:hidden; }
        .intensidad-fill { height:100%; border-radius:4px; transition:width .4s; }
        #toast-lista { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; min-width:260px; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="row mb-3 align-items-center">
        <div class="col">
            <h2 class="fw-bold mb-0">🃏 Lista de Decants</h2>
            <p class="text-muted mb-0 small">Personaliza y guarda las tarjetas de tu catálogo de decants</p>
        </div>
        <div class="col-auto d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-secondary btn-sm" onclick="window.location.href='decants.html'">
                <i class="bi bi-arrow-left"></i> Decants
            </button>
            <button class="btn btn-gold btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaTarjeta">
                <i class="bi bi-plus-circle"></i> Nueva Tarjeta
            </button>
        </div>
    </div>

    <div class="row g-3" id="grid-tarjetas">
        <div class="col-12 text-center text-muted py-5" id="empty-state">
            <i class="bi bi-card-list" style="font-size:3rem;"></i>
            <p class="mt-2">No hay tarjetas aún. Crea la primera.</p>
        </div>
    </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal fade" id="modalNuevaTarjeta" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold" id="titulo-modal-tarjeta">🃏 Nueva Tarjeta de Decant</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="tarjeta-edit-id">
                <div class="row g-4">

                    <!-- IZQUIERDA -->
                    <div class="col-lg-7">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">🔍 Selecciona perfume del inventario</label>
                            <select class="form-select" id="select-perfume" onchange="autocompletarDesdeInventario()">
                                <option value="">-- Elige un perfume (o escribe abajo) --</option>
                            </select>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-7">
                                <label class="form-label small fw-bold">Nombre del Perfume *</label>
                                <input type="text" class="form-control" id="t-nombre" placeholder="Ej: Sauvage" oninput="actualizarPreview()">
                            </div>
                            <div class="col-md-5">
                                <label class="form-label small fw-bold">Marca</label>
                                <input type="text" class="form-control" id="t-marca" placeholder="Ej: Dior" oninput="actualizarPreview()">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">URL Imagen</label>
                                <input type="url" class="form-control" id="t-imagen" placeholder="https://..." oninput="actualizarPreview()">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Descripción / Notas</label>
                                <textarea class="form-control" id="t-descripcion" rows="2" placeholder="Describe el perfume, sus notas..." oninput="actualizarPreview()"></textarea>
                            </div>
                        </div>

                        <!-- TALLAS TABLE -->
                        <div class="mt-3">
                            <label class="form-label small fw-bold mb-2">&#128200; Tallas disponibles y precio de venta</label>
                            <table class="tallas-table">
                                <thead>
                                    <tr>
                                        <th style="width:110px">Talla (ml)</th>
                                        <th>Precio Venta ($)</th>
                                        <th style="width:70px">Activa</th>
                                        <th style="width:36px"></th>
                                    </tr>
                                </thead>
                                <tbody id="tallas-tbody"></tbody>
                            </table>
                            <button type="button" class="btn-add-talla" onclick="agregarFilaTalla()">
                                <i class="bi bi-plus-circle"></i> Agregar talla
                            </button>
                        </div>

                        <!-- OCASIONES -->
                        <div class="mt-3">
                            <label class="form-label small fw-bold">🎯 Ocasiones</label>
                            <div id="ocas-checklist" class="d-flex flex-wrap gap-1"></div>
                        </div>
                        <!-- TEMPORADA -->
                        <div class="mt-3">
                            <label class="form-label small fw-bold">🌤️ Temporada / Clima</label>
                            <div id="temp-checklist" class="d-flex flex-wrap gap-1"></div>
                        </div>
                        <!-- INTENSIDAD -->
                        <div class="mt-3">
                            <label class="form-label small fw-bold">💨 Intensidad de proyección</label>
                            <div id="intens-checklist" class="d-flex flex-wrap gap-1"></div>
                        </div>
                    </div>

                    <!-- DERECHA: PREVIEW -->
                    <div class="col-lg-5">
                        <label class="form-label small fw-bold d-block mb-2">👁️ Vista previa</label>
                        <div id="card-preview-container"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-gold fw-bold" onclick="guardarTarjeta()">
                    <i class="bi bi-save"></i> Guardar Tarjeta
                </button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast-lista" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
        <div class="toast-body fw-bold" id="toast-body-lista">✅ Listo</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/storage.js"></script>
<script src="components/header.js"></script>
<script src="assets/js/utils.js"></script>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import {
    getFirestore, collection, getDocs,
    doc, setDoc, deleteDoc, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCgyk8dmNoxG0C-hDIHqyeVAh_r68i7X0A",
    authDomain:        "fitoscents-admin.firebaseapp.com",
    projectId:         "fitoscents-admin",
    storageBucket:     "fitoscents-admin.firebasestorage.app",
    messagingSenderId: "1031164903960",
    appId:             "1:1031164903960:web:1a414c4fb0a12b26c2796d"
};
const app = getApps().find(a => a.name === 'listadecants')
    || initializeApp(FIREBASE_CONFIG, 'listadecants');
const db = getFirestore(app);

const OCASIONES = [
    { id:'diario',   emoji:'📅', label:'Firma / Diario',         cls:'tag-diario'   },
    { id:'oficina',  emoji:'💼', label:'Oficina / Formal',        cls:'tag-oficina'  },
    { id:'cita',     emoji:'🌹', label:'Cita Romántica',          cls:'tag-cita'     },
    { id:'noche',    emoji:'🌙', label:'Noche',                   cls:'tag-noche'    },
    { id:'club',     emoji:'🎉', label:'Club / Fiesta',           cls:'tag-club'     },
    { id:'casual',   emoji:'😊', label:'Casual / Salida',         cls:'tag-casual'   },
    { id:'deporte',  emoji:'🏃', label:'Deporte / Gym',           cls:'tag-diario'   },
    { id:'viaje',    emoji:'✈️', label:'Viaje',                   cls:'tag-todo'     },
    { id:'invierno', emoji:'❄️', label:'Invierno / Frío',         cls:'tag-invierno' },
    { id:'verano',   emoji:'☀️', label:'Verano / Calor',          cls:'tag-verano'   },
];
const TEMPORADAS = [
    { id:'todo',      emoji:'🌀', label:'Todo el año'      },
    { id:'primavera', emoji:'🌸', label:'Primavera'        },
    { id:'verano',    emoji:'☀️', label:'Verano / Calor'   },
    { id:'otono',     emoji:'🍂', label:'Otoño'            },
    { id:'invierno',  emoji:'❄️', label:'Invierno / Frío'  },
];
const INTENSIDADES = [
    { id:'sutil',    emoji:'🌬️', label:'Sutil (cercana)',             pct:25,  color:'#6ea8fe' },
    { id:'moderada', emoji:'💨', label:'Moderada',                    pct:50,  color:'#75c896' },
    { id:'alta',     emoji:'🌊', label:'Alta',                        pct:75,  color:'#ffc107' },
    { id:'bestia',   emoji:'🔥', label:'Bestia / Proyección extrema', pct:100, color:'#dc3545' },
];

function renderChecklist(cid, items, prefix) {
    document.getElementById(cid).innerHTML = items.map(it =>
        `<input type="checkbox" class="${prefix}-check" id="${prefix}-${it.id}" value="${it.id}" onchange="actualizarPreview()">
         <label class="${prefix}-label" for="${prefix}-${it.id}">${it.emoji} ${it.label}</label>`
    ).join('');
}
renderChecklist('ocas-checklist',   OCASIONES,    'ocas');
renderChecklist('temp-checklist',   TEMPORADAS,   'temp');
renderChecklist('intens-checklist', INTENSIDADES, 'intens');

function getChecked(p) {
    return [...document.querySelectorAll(`.${p}-check:checked`)].map(c => c.value);
}
function setChecked(p, vals = []) {
    document.querySelectorAll(`.${p}-check`).forEach(c => c.checked = vals.includes(c.value));
}

// ── TALLAS ──
let tallaCounter = 0;

window.agregarFilaTalla = function(ml = '', precio = '', activa = true) {
    const id = ++tallaCounter;
    const tbody = document.getElementById('tallas-tbody');
    const tr = document.createElement('tr');
    tr.id = `talla-row-${id}`;
    tr.innerHTML = `
        <td><input type="number" class="talla-input" placeholder="ej: 5" value="${ml}" min="0" step="0.5" oninput="actualizarPreview()" data-ml></td>
        <td><div class="precio-prefix"><span>$</span><input type="number" class="talla-input" placeholder="0.00" value="${precio}" min="0" step="0.5" oninput="actualizarPreview()" data-precio></div></td>
        <td style="text-align:center">
            <div class="form-check form-switch d-flex justify-content-center mb-0">
                <input class="form-check-input" type="checkbox" role="switch" id="talla-activa-${id}" ${activa ? 'checked' : ''} style="width:2.4em;height:1.3em;cursor:pointer" onchange="actualizarPreview()">
            </div>
        </td>
        <td><button type="button" class="btn-del-talla" onclick="eliminarFilaTalla(${id})" title="Eliminar">×</button></td>
    `;
    tbody.appendChild(tr);
    actualizarPreview();
};

window.eliminarFilaTalla = function(id) {
    document.getElementById(`talla-row-${id}`)?.remove();
    actualizarPreview();
};

function getTallas() {
    return [...document.querySelectorAll('#tallas-tbody tr')].map(tr => ({
        ml:     parseFloat(tr.querySelector('[data-ml]').value)     || 0,
        precio: parseFloat(tr.querySelector('[data-precio]').value) || 0,
        activa: tr.querySelector('input[type=checkbox]').checked,
    })).filter(r => r.ml > 0);
}
function setTallas(arr = []) {
    document.getElementById('tallas-tbody').innerHTML = '';
    tallaCounter = 0;
    if (!arr.length) { agregarFilaTalla(); return; }
    arr.forEach(r => agregarFilaTalla(r.ml, r.precio, r.activa !== false));
}
function tallasToHTML(tallas) {
    return tallas.map(r => {
        const cls = r.activa ? 'talla-pill' : 'talla-pill inactiva';
        const label = r.precio > 0 ? `${r.ml}ML - $${r.precio}` : `${r.ml}ML`;
        return `<span class="${cls}">${label}</span>`;
    }).join('');
}

// ── FOTO BLOCK (cuadrado izquierda) ──
function fotoCol(src) {
    if (src) {
        return `<div class="card-img-col">
            <img src="${src}" alt="perfume" loading="lazy"
                 onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>FOTO</div>'">
        </div>`;
    }
    return `<div class="card-img-col"><div class="card-img-placeholder">FOTO<br>PERFUME</div></div>`;
}

// ── AUTOCOMPLETAR ──
window.autocompletarDesdeInventario = function() {
    const sel = document.getElementById('select-perfume');
    const opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.value) return;
    const d = JSON.parse(opt.dataset.info || '{}');
    document.getElementById('t-nombre').value      = d.nombre || '';
    document.getElementById('t-marca').value       = d.marca  || '';
    document.getElementById('t-imagen').value      = d.imagen || '';
    document.getElementById('t-descripcion').value = d.descripcion || '';
    actualizarPreview();
};

// ── PREVIEW ──
window.actualizarPreview = function() {
    const nombre = document.getElementById('t-nombre').value || 'Nombre del perfume';
    const marca  = document.getElementById('t-marca').value  || 'Marca';
    const imagen = document.getElementById('t-imagen').value;
    const desc   = document.getElementById('t-descripcion').value;
    const ocas   = getChecked('ocas');
    const temps  = getChecked('temp');
    const intens = getChecked('intens');
    const tallas = getTallas();

    const tagsOcas = ocas.map(id => {
        const o = OCASIONES.find(x => x.id === id);
        return o ? `<span class="tag-badge ${o.cls}">${o.emoji} ${o.label}</span>` : '';
    }).join('');
    const tagsTemp = temps.map(id => {
        const t = TEMPORADAS.find(x => x.id === id);
        return t ? `<span class="tag-badge tag-todo">${t.emoji} ${t.label}</span>` : '';
    }).join('');
    const intensObj = INTENSIDADES.find(x => intens.includes(x.id));
    const intensHTML = intensObj ? `
        <div class="mt-2">
            <div class="d-flex justify-content-between small mb-1">
                <span class="text-muted">💨 Proyección</span>
                <span style="color:${intensObj.color}">${intensObj.emoji} ${intensObj.label}</span>
            </div>
            <div class="intensidad-bar"><div class="intensidad-fill" style="width:${intensObj.pct}%;background:${intensObj.color}"></div></div>
        </div>` : '';

    const tallasHTML = tallasToHTML(tallas);
    const tagsHTML = (tagsOcas || tagsTemp)
        ? `<div class="card-tags-row">${tagsOcas}${tagsTemp}</div>` : '';

    document.getElementById('card-preview-container').innerHTML = `
        <div class="decant-card-preview shadow">
            ${fotoCol(imagen)}
            <div class="card-body-col">
                <h6 class="fw-bold mb-0" style="color:#ffd966;font-size:.95rem">${nombre}</h6>
                <p class="small text-muted mb-1" style="font-size:.78rem">${marca}</p>
                ${desc ? `<p class="text-secondary mb-2" style="font-size:.75rem;line-height:1.35">${desc}</p>` : ''}
                ${tallasHTML ? `<div class="mb-2">${tallasHTML}</div>` : ''}
                ${tagsHTML}
                ${intensHTML}
            </div>
        </div>
    `;
};

// ── CARGAR INVENTARIO ──
async function cargarPerfumesInventario() {
    try {
        let snap = await getDocs(collection(db, 'inventario'));
        if (snap.empty) snap = await getDocs(collection(db, 'products'));
        const sel = document.getElementById('select-perfume');
        snap.forEach(d => {
            const p = d.data();
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.text  = `${p.nombre||p.name||''} — ${p.marca||p.brand||''}`;
            opt.dataset.info = JSON.stringify({
                nombre:      p.nombre||p.name||'',
                marca:       p.marca||p.brand||'',
                imagen:      p.imagen||p.imageUrl||'',
                descripcion: p.descripcion||p.description||'',
            });
            sel.appendChild(opt);
        });
    } catch(e) { console.warn('No se pudo cargar inventario:', e); }
}

// ── CARGAR TARJETAS ──
async function cargarTarjetas() {
    try {
        const snap  = await getDocs(collection(db, 'listadecants'));
        const grid  = document.getElementById('grid-tarjetas');
        const empty = document.getElementById('empty-state');
        if (snap.empty) { empty.style.display = ''; return; }
        empty.style.display = 'none';
        grid.innerHTML = '';
        snap.forEach(d => renderTarjetaGrid(d.id, d.data()));
    } catch(e) { console.error('Error cargando tarjetas:', e); }
}

function renderTarjetaGrid(id, t) {
    const grid   = document.getElementById('grid-tarjetas');
    const tallas = t.tallas || [];

    const tagsOcas = (t.ocasiones||[]).map(oid => {
        const o = OCASIONES.find(x=>x.id===oid);
        return o ? `<span class="tag-badge ${o.cls}">${o.emoji} ${o.label}</span>` : '';
    }).join('');
    const tagsTemp = (t.temporadas||[]).map(tid => {
        const te = TEMPORADAS.find(x=>x.id===tid);
        return te ? `<span class="tag-badge tag-todo">${te.emoji} ${te.label}</span>` : '';
    }).join('');
    const intensObj = INTENSIDADES.find(x=>x.id===t.intensidad);
    const intensHTML = intensObj ? `
        <div class="mt-2">
            <div class="d-flex justify-content-between small mb-1">
                <span class="text-muted">💨 Proyección</span>
                <span style="color:${intensObj.color}">${intensObj.emoji} ${intensObj.label}</span>
            </div>
            <div class="intensidad-bar"><div class="intensidad-fill" style="width:${intensObj.pct}%;background:${intensObj.color}"></div></div>
        </div>` : '';

    const tallasHTML = tallasToHTML(tallas);
    const tagsHTML = (tagsOcas || tagsTemp)
        ? `<div class="card-tags-row">${tagsOcas}${tagsTemp}</div>` : '';

    const col = document.createElement('div');
    col.className = 'col-12 col-md-6 col-xl-4';
    col.id = `tarjeta-col-${id}`;
    col.innerHTML = `
        <div class="decant-card-preview shadow">
            ${fotoCol(t.imagen)}
            <div class="card-body-col">
                <h6 class="fw-bold mb-0" style="color:#ffd966;font-size:.95rem">${t.nombre||'—'}</h6>
                <p class="small text-muted mb-1" style="font-size:.78rem">${t.marca||''}</p>
                ${t.descripcion ? `<p class="text-secondary mb-2" style="font-size:.75rem;line-height:1.35">${t.descripcion}</p>` : ''}
                ${tallasHTML ? `<div class="mb-2">${tallasHTML}</div>` : ''}
                ${tagsHTML}
                ${intensHTML}
                <div class="mt-2 d-flex gap-2">
                    <button class="btn btn-outline-warning btn-sm flex-grow-1" onclick="editarTarjeta('${id}')">
                        <i class="bi bi-pencil"></i> Editar
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="eliminarTarjeta('${id}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    `;
    grid.appendChild(col);
}

// ── GUARDAR ──
window.guardarTarjeta = async function() {
    const nombre = document.getElementById('t-nombre').value.trim();
    if (!nombre) { alert('El nombre del perfume es obligatorio.'); return; }
    const tallasData = getTallas();
    const intensArr  = getChecked('intens');
    const data = {
        nombre,
        marca:       document.getElementById('t-marca').value.trim(),
        imagen:      document.getElementById('t-imagen').value.trim(),
        descripcion: document.getElementById('t-descripcion').value.trim(),
        tallas:      tallasData,
        ocasiones:   getChecked('ocas'),
        temporadas:  getChecked('temp'),
        intensidad:  intensArr[0] || '',
        updatedAt:   serverTimestamp(),
    };
    const editId = document.getElementById('tarjeta-edit-id').value;
    const docRef = editId ? doc(db,'listadecants',editId) : doc(collection(db,'listadecants'));
    if (!editId) data.createdAt = serverTimestamp();
    try {
        await setDoc(docRef, data, { merge: true });
        mostrarToast('✅ Tarjeta guardada');
        bootstrap.Modal.getInstance(document.getElementById('modalNuevaTarjeta')).hide();
        document.getElementById('grid-tarjetas').innerHTML =
            '<div class="col-12 text-center text-muted py-5" id="empty-state"><i class="bi bi-hourglass-split" style="font-size:2rem;"></i><p class="mt-2">Cargando...</p></div>';
        await cargarTarjetas();
    } catch(e) { console.error(e); alert('Error al guardar: '+e.message); }
};

// ── EDITAR ──
window.editarTarjeta = async function(id) {
    try {
        const snap = await getDocs(collection(db, 'listadecants'));
        const d    = snap.docs.find(x => x.id === id);
        if (!d) return;
        const t = d.data();
        document.getElementById('tarjeta-edit-id').value  = id;
        document.getElementById('t-nombre').value         = t.nombre      || '';
        document.getElementById('t-marca').value          = t.marca       || '';
        document.getElementById('t-imagen').value         = t.imagen      || '';
        document.getElementById('t-descripcion').value    = t.descripcion || '';
        document.getElementById('titulo-modal-tarjeta').textContent = '✏️ Editar Tarjeta';
        let tallasArr = t.tallas || [];
        if (typeof tallasArr === 'string') {
            tallasArr = tallasArr.split(',').map(ml => ({
                ml: parseFloat(ml.trim()) || 0,
                precio: 0, activa: true
            })).filter(r => r.ml > 0);
        }
        setTallas(tallasArr);
        setChecked('ocas',   t.ocasiones  || []);
        setChecked('temp',   t.temporadas || []);
        setChecked('intens', t.intensidad ? [t.intensidad] : []);
        actualizarPreview();
        new bootstrap.Modal(document.getElementById('modalNuevaTarjeta')).show();
    } catch(e) { console.error(e); }
};

// ── ELIMINAR ──
window.eliminarTarjeta = async function(id) {
    if (!confirm('¿Eliminar esta tarjeta?')) return;
    try {
        await deleteDoc(doc(db, 'listadecants', id));
        document.getElementById(`tarjeta-col-${id}`)?.remove();
        mostrarToast('🗑️ Tarjeta eliminada');
        if (!document.querySelector('#grid-tarjetas [id^=tarjeta-col]')) {
            document.getElementById('grid-tarjetas').innerHTML =
                '<div class="col-12 text-center text-muted py-5" id="empty-state"><i class="bi bi-card-list" style="font-size:3rem;"></i><p class="mt-2">No hay tarjetas aún.</p></div>';
        }
    } catch(e) { alert('Error: '+e.message); }
};

// ── TOAST ──
function mostrarToast(msg) {
    document.getElementById('toast-body-lista').textContent = msg;
    new bootstrap.Toast(document.getElementById('toast-lista'), { delay:2500 }).show();
}

// ── LIMPIAR MODAL ──
document.getElementById('modalNuevaTarjeta').addEventListener('show.bs.modal', () => {
    if (!document.getElementById('tarjeta-edit-id').value) {
        ['t-nombre','t-marca','t-imagen','t-descripcion'].forEach(id => {
            document.getElementById(id).value = '';
        });
        setTallas([]);
        setChecked('ocas',   []);
        setChecked('temp',   []);
        setChecked('intens', []);
        document.getElementById('titulo-modal-tarjeta').textContent = '🃏 Nueva Tarjeta de Decant';
        document.getElementById('select-perfume').value = '';
        actualizarPreview();
    }
    document.getElementById('tarjeta-edit-id').value = '';
});

// ── INIT ──
cargarPerfumesInventario();
cargarTarjetas();
setTallas([]);
actualizarPreview();
</script>
