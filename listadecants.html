<!DOCTYPE html>
<html lang="es">
<head>
    <script src="assets/js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitoscents - Lista de Decants</title>
    <script src="assets/js/config.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/ui.css">
    <link rel="stylesheet" href="assets/css/features.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .decant-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            border-left: 4px solid #d4af37;
            padding: 14px 16px;
            display: flex;
            gap: 14px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            align-items: flex-start;
            width: 100%;
            box-sizing: border-box;
        }

        /* Imagen FIJA 80x80 — nunca crece, nunca se comprime */
        .decant-card .card-image {
            width: 80px;
            min-width: 80px;
            max-width: 80px;
            height: 80px;
            min-height: 80px;
            max-height: 80px;
            background-color: #2a2a2a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            flex-grow: 0;
            align-self: flex-start;
            font-size: 10px;
            color: #666;
            text-align: center;
            overflow: hidden;
        }
        .decant-card .card-image img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            object-position: center;
            display: block;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .card-header > div:first-child {
            flex-shrink: 1;
            min-width: 0;
        }

        .perfume-title {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #fff;
            line-height: 1.2;
        }
        .perfume-brand {
            margin: 0;
            font-size: 11px;
            color: #8d9bb5;
        }

        /* Tags en fila horizontal, compactos */
        .tags-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 3px;
            align-items: flex-start;
            justify-content: flex-end;
            flex-shrink: 0;
            max-width: 48%;
        }

        .tag {
            font-size: 8px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
            line-height: 1.5;
        }
        .tag-diario    { background-color: #333;    color: #fff; }
        .tag-oficina   { background-color: #1a2a3a; color: #6ea8fe; border: 1px solid #0d6efd; }
        .tag-cita      { background-color: #2a0a1a; color: #f1afd0; border: 1px solid #d63384; }
        .tag-noche     { background-color: #1a0b2e; color: #b388ff; }
        .tag-club      { background-color: #2a0a0a; color: #f5a1a8; border: 1px solid #dc3545; }
        .tag-casual    { background-color: #0a1a10; color: #75c896; border: 1px solid #198754; }
        .tag-deporte   { background-color: #0a1a20; color: #6edff6; border: 1px solid #0dcaf0; }
        .tag-viaje     { background-color: #2a2010; color: #ffda6a; border: 1px solid #ffc107; }
        .tag-todo      { background-color: #2c3e50; color: #a8d5ff; }
        .tag-invierno  { background-color: #0a1530; color: #9ec5fe; border: 1px solid #0d6efd; }
        .tag-verano    { background-color: #2a1a00; color: #ffe69c; border: 1px solid #ffc107; }
        .tag-primavera { background-color: #0a1a10; color: #75c896; border: 1px solid #198754; }
        .tag-otono     { background-color: #2a1000; color: #feb272; border: 1px solid #fd7e14; }

        .description {
            margin: 0;
            font-size: 11px;
            color: #cccccc;
            line-height: 1.4;
        }

        .prices-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .price-pill {
            background-color: #d4af37;
            color: #121212;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .price-pill.inactiva {
            background-color: #333;
            color: #666;
            text-decoration: line-through;
        }

        .card-intens {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .card-intens-label { font-size: .72rem; color: #8d9bb5; }
        .card-intens-row   { display: flex; align-items: center; gap: 10px; }
        .intensidad-bar {
            flex: 1;
            height: 6px;
            border-radius: 4px;
            background: #2a2a2a;
            overflow: hidden;
            min-width: 60px;
        }
        .intensidad-fill   { height: 100%; border-radius: 4px; }
        .card-intens-val   { font-size: .72rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

        .tarjeta-wrapper   { display: flex; flex-direction: column; gap: 6px; }
        .tarjeta-acciones  { display: flex; gap: 6px; }

        /* ── MODAL CHECKLISTS ── */
        .ocas-check, .temp-check { display: none; }
        .ocas-label, .temp-label {
            cursor: pointer; border: 1px solid #444; border-radius: 20px;
            padding: 4px 12px; font-size: 0.78rem; user-select: none;
            transition: all .15s; margin: 2px; display: inline-block;
        }
        .ocas-check:checked + .ocas-label,
        .temp-check:checked + .temp-label {
            background: rgba(201,168,76,.3); border-color: #c9a84c; color: #ffd966; font-weight: 700;
        }
        .intens-radio { display: none; }
        .intens-label {
            cursor: pointer; border: 1px solid #444; border-radius: 20px;
            padding: 4px 12px; font-size: 0.78rem; user-select: none;
            transition: all .15s; margin: 2px; display: inline-block;
        }
        .intens-radio:checked + .intens-label {
            background: rgba(201,168,76,.3); border-color: #c9a84c; color: #ffd966; font-weight: 700;
        }

        .tallas-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
        .tallas-table thead th { font-size: .78rem; font-weight: 700; text-transform: uppercase; color: #adb5bd; padding: 4px 10px; letter-spacing: .04em; }
        .tallas-table tbody tr { background: #1a1a2e; border-radius: 8px; }
        .tallas-table tbody td { padding: 6px 8px; vertical-align: middle; }
        .tallas-table tbody tr td:first-child { border-radius: 8px 0 0 8px; }
        .tallas-table tbody tr td:last-child  { border-radius: 0 8px 8px 0; }
        .talla-input { background: #0d0d1a; border: 1px solid #333; color: #fff; border-radius: 6px; padding: 5px 10px; width: 100%; font-size: .88rem; }
        .talla-input:focus { outline: none; border-color: #c9a84c; box-shadow: 0 0 0 2px rgba(201,168,76,.25); }
        .talla-input::placeholder { color: #555; }
        .precio-prefix { display: flex; align-items: center; gap: 4px; }
        .precio-prefix span { color: #adb5bd; font-size: .88rem; padding-left: 6px; }
        .btn-del-talla { background: none; border: none; color: #c0392b; font-size: 1rem; cursor: pointer; padding: 4px 6px; opacity: .7; transition: opacity .15s; }
        .btn-del-talla:hover { opacity: 1; }
        .btn-add-talla { background: rgba(201,168,76,.12); border: 1px dashed #c9a84c; color: #ffd966; border-radius: 8px; padding: 6px 16px; font-size: .82rem; cursor: pointer; transition: all .15s; width: 100%; margin-top: 4px; }
        .btn-add-talla:hover { background: rgba(201,168,76,.22); }

        #toast-lista { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; min-width: 260px; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="row mb-3 align-items-center">
        <div class="col">
            <h2 class="fw-bold mb-0">🃏 Lista de Decants</h2>
            <p class="text-muted mb-0 small">Personaliza y guarda las tarjetas de tu catálogo de decants</p>
        </div>
        <div class="col-auto d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-secondary btn-sm" onclick="window.location.href='decants.html'">
                <i class="bi bi-arrow-left"></i> Decants
            </button>
            <button class="btn btn-gold btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaTarjeta">
                <i class="bi bi-plus-circle"></i> Nueva Tarjeta
            </button>
        </div>
    </div>

    <div class="row g-3" id="grid-tarjetas">
        <div class="col-12 text-center text-muted py-5" id="empty-state">
            <i class="bi bi-card-list" style="font-size:3rem;"></i>
            <p class="mt-2">No hay tarjetas aún. Crea la primera.</p>
        </div>
    </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal fade" id="modalNuevaTarjeta" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold" id="titulo-modal-tarjeta">🃏 Nueva Tarjeta de Decant</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="tarjeta-edit-id">
                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">🔍 Selecciona perfume del inventario</label>
                            <select class="form-select" id="select-perfume" onchange="autocompletarDesdeInventario()">
                                <option value="">-- Elige un perfume (o escribe abajo) --</option>
                            </select>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-7">
                                <label class="form-label small fw-bold">Nombre del Perfume *</label>
                                <input type="text" class="form-control" id="t-nombre" placeholder="Ej: Sauvage" oninput="actualizarPreview()">
                            </div>
                            <div class="col-md-5">
                                <label class="form-label small fw-bold">Marca</label>
                                <input type="text" class="form-control" id="t-marca" placeholder="Ej: Dior" oninput="actualizarPreview()">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">URL Imagen</label>
                                <input type="url" class="form-control" id="t-imagen" placeholder="https://..." oninput="actualizarPreview()">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Descripción / Notas</label>
                                <textarea class="form-control" id="t-descripcion" rows="2" placeholder="Describe el perfume, sus notas..." oninput="actualizarPreview()"></textarea>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label class="form-label small fw-bold mb-2">&#128200; Tallas disponibles y precio de venta</label>
                            <table class="tallas-table">
                                <thead><tr>
                                    <th style="width:110px">Talla (ml)</th>
                                    <th>Precio Venta ($)</th>
                                    <th style="width:70px">Activa</th>
                                    <th style="width:36px"></th>
                                </tr></thead>
                                <tbody id="tallas-tbody"></tbody>
                            </table>
                            <button type="button" class="btn-add-talla" onclick="agregarFilaTalla()">
                                <i class="bi bi-plus-circle"></i> Agregar talla
                            </button>
                        </div>
                        <div class="mt-3">
                            <label class="form-label small fw-bold">🎯 Ocasiones</label>
                            <div id="ocas-checklist" class="d-flex flex-wrap gap-1"></div>
                        </div>
                        <div class="mt-3">
                            <label class="form-label small fw-bold">🌤️ Temporada / Clima</label>
                            <div id="temp-checklist" class="d-flex flex-wrap gap-1"></div>
                        </div>
                        <div class="mt-3">
                            <label class="form-label small fw-bold">💨 Intensidad de proyección <span class="text-muted" style="font-weight:400;font-size:.75rem">(elige una)</span></label>
                            <div id="intens-checklist" class="d-flex flex-wrap gap-1"></div>
                        </div>
                    </div>
                    <div class="col-lg-5">
                        <label class="form-label small fw-bold d-block mb-2">👁️ Vista previa</label>
                        <div id="card-preview-container"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-gold fw-bold" onclick="guardarTarjeta()">
                    <i class="bi bi-save"></i> Guardar Tarjeta
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast-lista" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
        <div class="toast-body fw-bold" id="toast-body-lista">✅ Listo</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/storage.js"></script>
<script src="components/header.js"></script>
<script src="assets/js/utils.js"></script>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCgyk8dmNoxG0C-hDIHqyeVAh_r68i7X0A",
    authDomain:        "fitoscents-admin.firebaseapp.com",
    projectId:         "fitoscents-admin",
    storageBucket:     "fitoscents-admin.firebasestorage.app",
    messagingSenderId: "1031164903960",
    appId:             "1:1031164903960:web:1a414c4fb0a12b26c2796d"
};
const app = getApps().find(a => a.name === 'listadecants') || initializeApp(FIREBASE_CONFIG, 'listadecants');
const db  = getFirestore(app);

const OCASIONES = [
    { id:'diario',   emoji:'📍', label:'Firma / Diario',   cls:'tag-diario'   },
    { id:'oficina',  emoji:'💼', label:'Oficina / Formal', cls:'tag-oficina'  },
    { id:'cita',     emoji:'🌹', label:'Cita Romántica',   cls:'tag-cita'     },
    { id:'noche',    emoji:'🌙', label:'Noche',            cls:'tag-noche'    },
    { id:'club',     emoji:'🎉', label:'Club / Fiesta',    cls:'tag-club'     },
    { id:'casual',   emoji:'😊', label:'Casual / Salida',  cls:'tag-casual'   },
    { id:'deporte',  emoji:'🏃', label:'Deporte / Gym',    cls:'tag-deporte'  },
    { id:'viaje',    emoji:'✈️', label:'Viaje',            cls:'tag-viaje'    },
];
const TEMPORADAS = [
    { id:'todo',      emoji:'🌀', label:'Todo el año'     },
    { id:'primavera', emoji:'🌸', label:'Primavera'       },
    { id:'verano',    emoji:'☀️', label:'Verano / Calor'  },
    { id:'otono',     emoji:'🍂', label:'Otoño'           },
    { id:'invierno',  emoji:'❄️', label:'Invierno / Frío' },
];
const INTENSIDADES = [
    { id:'sutil',    emoji:'🌬️', label:'Sutil',    sublabel:'proyección cercana', pct:25,  color:'#6ea8fe' },
    { id:'moderada', emoji:'💨', label:'Moderada', sublabel:'proyección media',   pct:50,  color:'#75c896' },
    { id:'alta',     emoji:'🌊', label:'Alta',     sublabel:'buena proyección',   pct:75,  color:'#ffc107' },
    { id:'bestia',   emoji:'🔥', label:'Bestia',   sublabel:'proyección extrema', pct:100, color:'#dc3545' },
];

function renderChecklist(cid, items, prefix) {
    document.getElementById(cid).innerHTML = items.map(it =>
        `<input type="checkbox" class="${prefix}-check" id="${prefix}-${it.id}" value="${it.id}" onchange="actualizarPreview()">
         <label class="${prefix}-label" for="${prefix}-${it.id}">${it.emoji} ${it.label}</label>`
    ).join('');
}
renderChecklist('ocas-checklist', OCASIONES,  'ocas');
renderChecklist('temp-checklist', TEMPORADAS, 'temp');

function renderIntensRadio() {
    document.getElementById('intens-checklist').innerHTML = INTENSIDADES.map(it =>
        `<input type="radio" class="intens-radio" name="intens-group" id="intens-${it.id}" value="${it.id}" onchange="actualizarPreview()">
         <label class="intens-label" for="intens-${it.id}">${it.emoji} ${it.label}</label>`
    ).join('');
}
renderIntensRadio();

function getChecked(p) { return [...document.querySelectorAll(`.${p}-check:checked`)].map(c => c.value); }
function setChecked(p, vals) { document.querySelectorAll(`.${p}-check`).forEach(c => c.checked = vals.includes(c.value)); }
function getIntens() { const r = document.querySelector('.intens-radio:checked'); return r ? r.value : ''; }
function setIntens(val) { document.querySelectorAll('.intens-radio').forEach(r => r.checked = (r.value === val)); }

let tallaCounter = 0;
window.agregarFilaTalla = function(ml='', precio='', activa=true) {
    const id = ++tallaCounter;
    const tr = document.createElement('tr');
    tr.id = `talla-row-${id}`;
    tr.innerHTML = `
        <td><input type="number" class="talla-input" placeholder="ej:5" value="${ml}" min="0" step="0.5" oninput="actualizarPreview()" data-ml></td>
        <td><div class="precio-prefix"><span>$</span><input type="number" class="talla-input" placeholder="0" value="${precio}" min="0" step="0.5" oninput="actualizarPreview()" data-precio></div></td>
        <td style="text-align:center">
            <div class="form-check form-switch d-flex justify-content-center mb-0">
                <input class="form-check-input" type="checkbox" role="switch" id="ta-${id}" ${activa?'checked':''} style="width:2.4em;height:1.3em;cursor:pointer" onchange="actualizarPreview()">
            </div>
        </td>
        <td><button type="button" class="btn-del-talla" onclick="eliminarFilaTalla(${id})">×</button></td>`;
    document.getElementById('tallas-tbody').appendChild(tr);
    actualizarPreview();
};
window.eliminarFilaTalla = function(id) { document.getElementById(`talla-row-${id}`)?.remove(); actualizarPreview(); };

function getTallas() {
    return [...document.querySelectorAll('#tallas-tbody tr')].map(tr => ({
        ml:     parseFloat(tr.querySelector('[data-ml]').value)     || 0,
        precio: parseFloat(tr.querySelector('[data-precio]').value) || 0,
        activa: tr.querySelector('input[type=checkbox]').checked,
    })).filter(r => r.ml > 0);
}
function setTallas(arr=[]) {
    document.getElementById('tallas-tbody').innerHTML = '';
    tallaCounter = 0;
    arr.length ? arr.forEach(r => agregarFilaTalla(r.ml, r.precio, r.activa !== false)) : agregarFilaTalla();
}

function buildCard(d) {
    const nombre = d.nombre || 'Nombre del perfume';
    const marca  = d.marca  || '';
    const desc   = d.descripcion ? `<p class="description">${d.descripcion}</p>` : '';

    const imgHTML = d.imagen
        ? `<img src="${d.imagen}" alt="${nombre}" onerror="this.outerHTML='<span style=color:#555;font-size:10px>FOTO<br>PERFUME</span>'">`
        : `<span style="color:#555;font-size:10px;text-align:center">FOTO<br>PERFUME</span>`;

    const allTagsData = [
        ...( d.ocasiones  || []).map(id => { const x=OCASIONES.find(o=>o.id===id);  return x?{emoji:x.emoji,label:x.label,cls:x.cls}:null; }),
        ...( d.temporadas || []).map(id => { const x=TEMPORADAS.find(t=>t.id===id); return x?{emoji:x.emoji,label:x.label,cls:'tag-'+id}:null; }),
    ].filter(Boolean);
    const tagsHTML = allTagsData.length
        ? `<div class="tags-container">${allTagsData.map(t=>`<span class="tag ${t.cls}">${t.emoji} ${t.label}</span>`).join('')}</div>`
        : '';

    const tallasHTML = (d.tallas||[]).length
        ? `<div class="prices-container">${(d.tallas||[]).map(r=>{
            const cls   = r.activa ? 'price-pill' : 'price-pill inactiva';
            const label = r.precio > 0 ? `${r.ml}ML - $${r.precio}` : `${r.ml}ML`;
            return `<span class="${cls}">${label}</span>`;
          }).join('')}</div>`
        : '';

    let intensHTML = '';
    if (d.intensidad) {
        const x = INTENSIDADES.find(i=>i.id===d.intensidad);
        if (x) intensHTML = `
            <div class="card-intens">
                <span class="card-intens-label">💨 Proyección</span>
                <div class="card-intens-row">
                    <div class="intensidad-bar"><div class="intensidad-fill" style="width:${x.pct}%;background:${x.color}"></div></div>
                    <span class="card-intens-val" style="color:${x.color}">${x.emoji} ${x.label} &mdash; ${x.sublabel}</span>
                </div>
            </div>`;
    }

    return `
        <div class="decant-card">
            <div class="card-image">${imgHTML}</div>
            <div class="card-content">
                <div class="card-header">
                    <div>
                        <h2 class="perfume-title">${nombre}</h2>
                        ${marca ? `<p class="perfume-brand">${marca}</p>` : ''}
                    </div>
                    ${tagsHTML}
                </div>
                ${desc}
                ${tallasHTML}
                ${intensHTML}
            </div>
        </div>`;
}

window.autocompletarDesdeInventario = function() {
    const opt = document.getElementById('select-perfume').selectedOptions[0];
    if (!opt?.value) return;
    const d = JSON.parse(opt.dataset.info || '{}');
    document.getElementById('t-nombre').value      = d.nombre || '';
    document.getElementById('t-marca').value       = d.marca  || '';
    document.getElementById('t-imagen').value      = d.imagen || '';
    document.getElementById('t-descripcion').value = d.descripcion || '';
    actualizarPreview();
};

window.actualizarPreview = function() {
    document.getElementById('card-preview-container').innerHTML = buildCard({
        nombre:      document.getElementById('t-nombre').value,
        marca:       document.getElementById('t-marca').value,
        imagen:      document.getElementById('t-imagen').value,
        descripcion: document.getElementById('t-descripcion').value,
        tallas:      getTallas(),
        ocasiones:   getChecked('ocas'),
        temporadas:  getChecked('temp'),
        intensidad:  getIntens(),
    });
};

async function cargarPerfumesInventario() {
    try {
        let snap = await getDocs(collection(db, 'inventario'));
        if (snap.empty) snap = await getDocs(collection(db, 'products'));
        const sel = document.getElementById('select-perfume');
        snap.forEach(d => {
            const p   = d.data();
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.text  = `${p.nombre||p.name||''} — ${p.marca||p.brand||''}`;
            opt.dataset.info = JSON.stringify({
                nombre: p.nombre||p.name||'', marca: p.marca||p.brand||'',
                imagen: p.imagen||p.imageUrl||'', descripcion: p.descripcion||p.description||'',
            });
            sel.appendChild(opt);
        });
    } catch(e) { console.warn('No se pudo cargar inventario:', e); }
}

async function cargarTarjetas() {
    try {
        const snap  = await getDocs(collection(db, 'listadecants'));
        const grid  = document.getElementById('grid-tarjetas');
        const empty = document.getElementById('empty-state');
        if (snap.empty) { empty.style.display=''; return; }
        empty.style.display = 'none';
        grid.innerHTML = '';
        snap.forEach(d => renderTarjetaGrid(d.id, d.data()));
    } catch(e) { console.error('Error cargando tarjetas:', e); }
}

function renderTarjetaGrid(id, t) {
    const col = document.createElement('div');
    col.className = 'col-12';
    col.id = `tarjeta-col-${id}`;
    col.innerHTML = `
        <div class="tarjeta-wrapper">
            <div id="card-snap-${id}">${buildCard(t)}</div>
            <div class="tarjeta-acciones">
                <button class="btn btn-outline-warning btn-sm flex-grow-1" onclick="editarTarjeta('${id}')">
                    <i class="bi bi-pencil"></i> Editar
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="eliminarTarjeta('${id}')" title="Eliminar">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>`;
    document.getElementById('grid-tarjetas').appendChild(col);
}

window.guardarTarjeta = async function() {
    const nombre = document.getElementById('t-nombre').value.trim();
    if (!nombre) { alert('El nombre del perfume es obligatorio.'); return; }
    const data = {
        nombre, marca: document.getElementById('t-marca').value.trim(),
        imagen: document.getElementById('t-imagen').value.trim(),
        descripcion: document.getElementById('t-descripcion').value.trim(),
        tallas: getTallas(), ocasiones: getChecked('ocas'),
        temporadas: getChecked('temp'), intensidad: getIntens(),
        updatedAt: serverTimestamp(),
    };
    const editId = document.getElementById('tarjeta-edit-id').value;
    const ref    = editId ? doc(db,'listadecants',editId) : doc(collection(db,'listadecants'));
    if (!editId) data.createdAt = serverTimestamp();
    try {
        await setDoc(ref, data, { merge:true });
        mostrarToast('✅ Tarjeta guardada');
        bootstrap.Modal.getInstance(document.getElementById('modalNuevaTarjeta')).hide();
        document.getElementById('grid-tarjetas').innerHTML =
            '<div class="col-12 text-center text-muted py-5" id="empty-state"><i class="bi bi-hourglass-split" style="font-size:2rem;"></i><p class="mt-2">Cargando...</p></div>';
        await cargarTarjetas();
    } catch(e) { console.error(e); alert('Error al guardar: '+e.message); }
};

window.editarTarjeta = async function(id) {
    try {
        const snap = await getDocs(collection(db,'listadecants'));
        const d    = snap.docs.find(x => x.id===id);
        if (!d) return;
        const t = d.data();
        document.getElementById('tarjeta-edit-id').value  = id;
        document.getElementById('t-nombre').value         = t.nombre      || '';
        document.getElementById('t-marca').value          = t.marca       || '';
        document.getElementById('t-imagen').value         = t.imagen      || '';
        document.getElementById('t-descripcion').value    = t.descripcion || '';
        document.getElementById('titulo-modal-tarjeta').textContent = '✏️ Editar Tarjeta';
        let ta = t.tallas||[];
        if (typeof ta==='string') ta=ta.split(',').map(ml=>({ml:parseFloat(ml)||0,precio:0,activa:true})).filter(r=>r.ml>0);
        setTallas(ta);
        setChecked('ocas',   t.ocasiones  || []);
        setChecked('temp',   t.temporadas || []);
        setIntens(t.intensidad || '');
        actualizarPreview();
        new bootstrap.Modal(document.getElementById('modalNuevaTarjeta')).show();
    } catch(e) { console.error(e); }
};

window.eliminarTarjeta = async function(id) {
    if (!confirm('¿Eliminar esta tarjeta?')) return;
    try {
        await deleteDoc(doc(db,'listadecants',id));
        document.getElementById(`tarjeta-col-${id}`)?.remove();
        mostrarToast('🗑️ Tarjeta eliminada');
        if (!document.querySelector('#grid-tarjetas [id^=tarjeta-col]'))
            document.getElementById('grid-tarjetas').innerHTML =
                '<div class="col-12 text-center text-muted py-5" id="empty-state"><i class="bi bi-card-list" style="font-size:3rem;"></i><p class="mt-2">No hay tarjetas aún.</p></div>';
    } catch(e) { alert('Error: '+e.message); }
};

function mostrarToast(msg) {
    document.getElementById('toast-body-lista').textContent = msg;
    new bootstrap.Toast(document.getElementById('toast-lista'),{delay:2500}).show();
}

document.getElementById('modalNuevaTarjeta').addEventListener('show.bs.modal', () => {
    if (!document.getElementById('tarjeta-edit-id').value) {
        ['t-nombre','t-marca','t-imagen','t-descripcion'].forEach(id => document.getElementById(id).value='');
        setTallas([]);
        setChecked('ocas',[]); setChecked('temp',[]); setIntens('');
        document.getElementById('titulo-modal-tarjeta').textContent = '🃏 Nueva Tarjeta de Decant';
        document.getElementById('select-perfume').value = '';
        actualizarPreview();
    }
    document.getElementById('tarjeta-edit-id').value = '';
});

cargarPerfumesInventario();
cargarTarjetas();
setTallas([]);
actualizarPreview();
</script>
</body>
</html>
