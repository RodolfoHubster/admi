<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitoscents Admin — Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <style>
        body {
            background: #08080c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 16px;
        }
        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(197,160,89,0.25);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(197,160,89,0.1);
        }
        .login-logo {
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 6px;
        }
        .login-title {
            text-align: center;
            color: #c5a059;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 4px;
        }
        .login-sub {
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
            margin-bottom: 32px;
        }
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(197,160,89,0.5);
            background: transparent;
            transition: all 0.2s ease;
        }
        .pin-dot.filled {
            background: #c5a059;
            border-color: #c5a059;
            box-shadow: 0 0 8px rgba(197,160,89,0.6);
        }
        .pin-dot.error {
            background: #dc3545;
            border-color: #dc3545;
            box-shadow: 0 0 8px rgba(220,53,69,0.6);
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .num-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            padding: 16px 0;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Poppins', sans-serif;
        }
        .num-btn:hover {
            background: rgba(197,160,89,0.15);
            border-color: rgba(197,160,89,0.4);
            color: #c5a059;
        }
        .num-btn:active {
            transform: scale(0.94);
        }
        .num-btn.del {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.5);
        }
        .num-btn.empty {
            visibility: hidden;
        }
        .error-msg {
            text-align: center;
            color: #dc3545;
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 16px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .error-msg.visible {
            opacity: 1;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-8px); }
            40%,80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.35s ease; }

        @media (max-width: 576px) {
            .login-card {
                padding: 28px 18px;
                border-radius: 16px;
                max-width: 100%;
            }
            .login-logo { font-size: 2.2rem; }
            .login-title { font-size: 1.1rem; }
            .login-sub { margin-bottom: 20px; }
            .pin-display { gap: 10px; margin-bottom: 20px; }
            .pin-dot {
                width: 16px;
                height: 16px;
            }
            .num-btn {
                font-size: 1.2rem;
                padding: 14px 0;
            }
        }

        @media (max-height: 700px) {
            body {
                align-items: flex-start;
                padding-top: 14px;
                padding-bottom: 14px;
            }
            .login-card {
                padding-top: 28px;
                padding-bottom: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">👑</div>
        <div class="login-title">Fitoscents Admin</div>
        <div class="login-sub">Ingresa tu PIN para continuar</div>

        <div class="mb-3">
            <label for="usuario-select" class="form-label text-light small mb-1">Usuario</label>
            <select id="usuario-select" class="form-select form-select-sm" style="background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(197,160,89,0.4);">
                <option value="admin">Administrador</option>
                <option value="vendedor">Vendedor</option>
                <option value="readonly">Solo lectura</option>
            </select>
            <small class="d-block mt-1" style="color: rgba(255,255,255,0.45);">Cada usuario tiene su PIN.</small>
        </div>

        <div class="pin-display" id="pin-display">
            <div class="pin-dot" id="dot-0"></div>
            <div class="pin-dot" id="dot-1"></div>
            <div class="pin-dot" id="dot-2"></div>
            <div class="pin-dot" id="dot-3"></div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="presionar('1')">1</button>
            <button class="num-btn" onclick="presionar('2')">2</button>
            <button class="num-btn" onclick="presionar('3')">3</button>
            <button class="num-btn" onclick="presionar('4')">4</button>
            <button class="num-btn" onclick="presionar('5')">5</button>
            <button class="num-btn" onclick="presionar('6')">6</button>
            <button class="num-btn" onclick="presionar('7')">7</button>
            <button class="num-btn" onclick="presionar('8')">8</button>
            <button class="num-btn" onclick="presionar('9')">9</button>
            <button class="num-btn empty"></button>
            <button class="num-btn" onclick="presionar('0')">0</button>
            <button class="num-btn del" onclick="borrar()">⌫</button>
        </div>

        <div class="error-msg" id="error-msg">❌ PIN incorrecto</div>
    </div>

    <script src="assets/js/runtime-config.js"></script>
<script src="assets/js/config.js"></script>
    <script>
        let pin = '';
        const SESSION_KEY = 'fito_session';
        const SESSION_VERSION_KEY = 'fito_session_version';
        const USUARIOS = {
            admin: {
                role: 'admin',
                label: 'Administrador',
                pinHash: 'e0b08ad65f5b6f6b75d18c8642a041ca1160609af1b7dfc55ab7f2d293fd8758'
            },
            vendedor: {
                role: 'vendedor',
                label: 'Vendedor',
                pinHash: '0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c'
            },
            readonly: {
                role: 'readonly',
                label: 'Solo lectura',
                pinHash: 'edee29f882543b956620b26d0ee0e7e950399b1c4222f5de05e06425b4c995e9'
            }
        };

        // Configuración de seguridad
        const MAX_INTENTOS = 3;
        const TIEMPO_BLOQUEO_MS = 3 * 60 * 1000; // 3 minutos en milisegundos

        function getSession() {
            try {
                return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
            } catch (e) {
                return null;
            }
        }

        const activeSession = getSession();
        if (activeSession && activeSession.auth === 'ok') {
            const dest = new URLSearchParams(location.search).get('redirect') || 'index.html';
            location.replace(dest);
        }

        // Convierte el texto plano a un Hash indescifrable
        async function hashearPIN(texto) {
            const encoder = new TextEncoder();
            const data = encoder.encode(texto);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Verifica si el usuario está en periodo de castigo
        function comprobarBloqueo() {
            const bloqueoHasta = localStorage.getItem('fito_bloqueo_hasta');
            if (bloqueoHasta && Date.now() < parseInt(bloqueoHasta)) {
                const faltan = Math.ceil((parseInt(bloqueoHasta) - Date.now()) / 1000 / 60);
                mostrarMensajeError(`🔒 Bloqueado. Intenta en ${faltan} min.`);
                return true;
            }
            if (bloqueoHasta) {
                // El castigo expiró, limpiamos el historial
                localStorage.removeItem('fito_bloqueo_hasta');
                localStorage.setItem('fito_intentos', '0');
                ocultarError();
            }
            return false;
        }

        // Registra los errores y aplica el bloqueo si se supera el límite
        function registrarFallo() {
            let intentos = parseInt(localStorage.getItem('fito_intentos') || '0');
            intentos++;
            localStorage.setItem('fito_intentos', intentos.toString());

            if (intentos >= MAX_INTENTOS) {
                const bloqueoHasta = Date.now() + TIEMPO_BLOQUEO_MS;
                localStorage.setItem('fito_bloqueo_hasta', bloqueoHasta.toString());
                mostrarMensajeError(`🔒 Demasiados intentos. Bloqueado por 3 min.`);
            } else {
                mostrarMensajeError(`❌ PIN incorrecto. Intentos: ${intentos}/${MAX_INTENTOS}`);
            }
        }

        function mostrarMensajeError(mensaje) {
            const errorEl = document.getElementById('error-msg');
            errorEl.textContent = mensaje;
            errorEl.classList.add('visible');
            document.getElementById('pin-display').classList.add('shake');
            setTimeout(() => {
                document.getElementById('pin-display').classList.remove('shake');
            }, 600);
        }

        function presionar(num) {
            if (comprobarBloqueo() || pin.length >= 4) return;
            pin += num;
            actualizarDots();
            if (pin.length === 4) {
                setTimeout(verificar, 120);
            }
        }

        function borrar() {
            if (comprobarBloqueo()) return;
            pin = pin.slice(0, -1);
            actualizarDots();
            ocultarError();
        }

        function actualizarDots() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById('dot-' + i);
                dot.classList.toggle('filled', i < pin.length);
                dot.classList.remove('error');
            }
        }

        async function verificar() {
            if (comprobarBloqueo()) {
                pin = '';
                actualizarDots();
                return;
            }

            const pinIngresadoHash = await hashearPIN(pin);

            const usuarioSeleccionado = document.getElementById('usuario-select').value;
            const user = USUARIOS[usuarioSeleccionado] || USUARIOS.admin;

            if (pinIngresadoHash === user.pinHash) {
                localStorage.setItem('fito_intentos', '0'); // Reiniciamos contador tras éxito
                const sessionVersion = localStorage.getItem(SESSION_VERSION_KEY) || String(Date.now());
                localStorage.setItem(SESSION_VERSION_KEY, sessionVersion);
                sessionStorage.setItem(SESSION_KEY, JSON.stringify({
                    auth: 'ok',
                    role: user.role,
                    username: user.label,
                    loginAt: Date.now(),
                    sessionVersion
                }));
                sessionStorage.setItem('fito_auth', 'ok'); // Compatibilidad temporal
                const dest = new URLSearchParams(location.search).get('redirect') || 'index.html';
                location.replace(dest);
            } else {
                for (let i = 0; i < 4; i++) {
                    document.getElementById('dot-' + i).classList.add('error');
                }
                registrarFallo();
                setTimeout(() => {
                    pin = '';
                    actualizarDots();
                }, 600);
            }
        }

        function ocultarError() {
            const errorEl = document.getElementById('error-msg');
            if (!errorEl.textContent.includes('Bloqueado')) {
                errorEl.classList.remove('visible');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') presionar(e.key);
            if (e.key === 'Backspace') borrar();
        });

        // Revisar estado al cargar la página
        comprobarBloqueo();
        const reason = new URLSearchParams(location.search).get('reason');
        if (reason === 'expired') {
            mostrarMensajeError('Sesión expirada o cerrada globalmente. Inicia sesión de nuevo.');
        }
    </script>
</body>
</html>
