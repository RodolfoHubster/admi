name: Bug report
description: Reportar un error en la aplicación
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Descripción del problema
      description: ¿Qué sucede y qué esperabas que sucediera?
      placeholder: Describe el comportamiento actual y el esperado
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista de pasos concretos para reproducir el problema
      placeholder: |
        1. Ir a...
        2. Hacer click en...
        3. Ver error...
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Página o módulo afectado
      placeholder: "Ej: asistente.html, ventas.html"

  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Logs, capturas o datos adicionales útiles
