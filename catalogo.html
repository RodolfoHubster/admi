<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — Fitoscents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/ui.css">
    <link rel="stylesheet" href="assets/css/features.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script type="module" src="assets/js/firebase.js"></script>
    <script src="components/header.js"></script>
    <style>
        .product-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,215,0,0.03) 100%);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(255,215,0,0.2); border-color: rgba(255,215,0,0.55); }
        .product-image { width: 100%; height: 260px; object-fit: cover; }
        .product-info { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 1rem; font-weight: 700; color: var(--gold-flat); margin-bottom: 4px; line-height: 1.3; }
        .product-brand { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; }
        .product-price { font-size: 1.7rem; font-weight: 800; color: var(--gold-flat); margin-top: auto; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .badge-disponible { position: absolute; top: 12px; right: 12px; background: rgba(255,215,0,0.92); color: #000; padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
        .badge-pedido { position: absolute; top: 12px; right: 12px; background: rgba(30,30,40,0.92); color: var(--gold-flat); padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; border: 1px solid rgba(255,215,0,0.4); }
        .badge-camino { position: absolute; top: 12px; right: 12px; background: rgba(30,100,200,0.92); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }

        /* Checkboxes de filtro personalizados */
        .filtro-checks { display: flex; flex-wrap: wrap; gap: 10px; }
        .filtro-check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            user-select: none;
        }
        .filtro-check-item input[type=checkbox] { display: none; }
        /* Disponibles */
        .filtro-check-item.tipo-disponible { background: rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.3); color: var(--gold-flat, #FFD700); }
        .filtro-check-item.tipo-disponible.activo { background: rgba(255,215,0,0.2); border-color: #FFD700; }
        /* En camino */
        .filtro-check-item.tipo-camino { background: rgba(30,100,220,0.08); border-color: rgba(30,100,220,0.3); color: #7aafff; }
        .filtro-check-item.tipo-camino.activo { background: rgba(30,100,220,0.2); border-color: #5588ff; }
        /* Pedidos */
        .filtro-check-item.tipo-pedido { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); color: var(--text-secondary, #aaa); }
        .filtro-check-item.tipo-pedido.activo { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); color: #fff; }
        /* Icono de palomita */
        .filtro-check-item .check-icon { font-size: 1rem; }
        .filtro-check-item:not(.activo) .check-icon { opacity: 0.35; }

        .filtros-catalogo .form-control,
        .filtros-catalogo .form-select { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,215,0,0.25); color: var(--text-primary); }
        .filtros-catalogo .form-control::placeholder { color: var(--text-secondary); }
        .filtros-catalogo .form-select option { background: #111; color: #fff; }
        .btn-whatsapp { background: #25D366; color: #fff; border: none; padding: 10px 22px; border-radius: 30px; font-weight: 600; transition: all 0.3s; }
        .btn-whatsapp:hover { background: #128C7E; color: #fff; transform: scale(1.04); box-shadow: 0 4px 12px rgba(37,211,102,0.4); }

        .print-only { display: none !important; }

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
            @page { size: A4 portrait; margin: 0; }
            html { background: #0d0d0d !important; }
            body { background: #0d0d0d !important; background-color: #0d0d0d !important; color: #f0f0f0 !important; font-family: 'Poppins', sans-serif !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }
            .no-print, .filtros-catalogo, header, nav, .modal, #catalogo-vacio, .print-tip { display: none !important; }
            .container-xl { max-width: 100% !important; width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .print-wrapper { display: block !important; padding: 14mm 13mm 12mm 13mm !important; background: #0d0d0d !important; min-height: 100vh !important; }
            .print-only { display: block !important; }
            .print-header { display: flex !important; justify-content: space-between; align-items: center; padding-bottom: 9px; margin-bottom: 12px; border-bottom: 2px solid #FFD700; }
            .print-header-logo { font-size: 1.35rem; font-weight: 700; color: #FFD700 !important; letter-spacing: 3px; text-transform: uppercase; }
            .print-header-sub { font-size: 0.73rem; color: #999 !important; text-align: right; line-height: 1.5; }
            #catalogo-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 7px !important; padding: 0 !important; margin: 0 !important; width: 100% !important; }
            #catalogo-grid > [class*="col"] { width: 100% !important; max-width: 100% !important; flex: none !important; padding: 0 !important; }
            .product-card { background: #1c1c1c !important; background-color: #1c1c1c !important; border: 1.5px solid #FFD700 !important; border-radius: 7px !important; overflow: hidden !important; break-inside: avoid !important; page-break-inside: avoid !important; display: flex !important; flex-direction: column !important; height: auto !important; box-shadow: none !important; transform: none !important; }
            .product-image { width: 100% !important; height: 150px !important; object-fit: cover !important; display: block !important; }
            .product-info { padding: 7px 9px 9px !important; background: #1c1c1c !important; background-color: #1c1c1c !important; }
            .product-name { color: #FFD700 !important; font-size: 0.78rem !important; font-weight: 700 !important; margin-bottom: 1px !important; text-shadow: none !important; line-height: 1.2 !important; }
            .product-brand { color: #888 !important; font-size: 0.66rem !important; margin-bottom: 4px !important; }
            .product-price { color: #FFD700 !important; font-size: 1.1rem !important; font-weight: 800 !important; text-shadow: none !important; margin-top: 2px !important; }
            .badge-disponible { background: #FFD700 !important; color: #000 !important; font-size: 0.56rem !important; padding: 2px 6px !important; border-radius: 9px !important; font-weight: 700 !important; top: 6px !important; right: 6px !important; }
            .badge-pedido { background: #111 !important; color: #FFD700 !important; border: 1px solid #FFD700 !important; font-size: 0.56rem !important; padding: 2px 6px !important; border-radius: 9px !important; top: 6px !important; right: 6px !important; }
            .badge-camino { background: #1a40a0 !important; color: #fff !important; font-size: 0.56rem !important; padding: 2px 6px !important; border-radius: 9px !important; top: 6px !important; right: 6px !important; }
            .print-footer { display: block !important; text-align: center; margin-top: 12px; padding-top: 7px; border-top: 1px solid #2a2a2a; font-size: 0.63rem; color: #444 !important; letter-spacing: 0.8px; }
        }
    </style>
</head>
<body>

<div class="container-xl my-4">
    <div class="print-wrapper">

        <!-- Header impreso -->
        <div class="print-only print-header">
            <div class="print-header-logo">&#128081; FITOSCENTS</div>
            <div class="print-header-sub">Cat&aacute;logo de Perfumes<br><span id="print-fecha"></span></div>
        </div>

        <!-- Header pantalla -->
        <div class="card shadow-sm mb-4 no-print">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h2 class="fw-bold mb-1"><i class="bi bi-gem text-gold"></i> Cat&aacute;logo de Perfumes</h2>
                        <p class="text-muted mb-0"><span id="total-productos">0</span> productos</p>
                    </div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-outline-secondary" onclick="window.location.href='index.html'">
                            <i class="bi bi-arrow-left"></i> Volver
                        </button>
                        <button class="btn btn-whatsapp" onclick="compartirCatalogo()">
                            <i class="bi bi-whatsapp"></i> Compartir
                        </button>
                        <button class="btn btn-outline-secondary" onclick="imprimirCatalogo()">
                            <i class="bi bi-printer"></i> Imprimir / PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtros con checkboxes -->
        <div class="card shadow-sm mb-4 no-print filtros-catalogo">
            <div class="card-body">
                <div class="row g-3 align-items-end">

                    <!-- Buscar -->
                    <div class="col-md-4">
                        <label class="form-label fw-bold small"><i class="bi bi-search"></i> Buscar</label>
                        <input type="text" class="form-control" id="buscar-catalogo" placeholder="Nombre, marca..." onkeyup="filtrarCatalogo()">
                    </div>

                    <!-- Checkboxes de categoría -->
                    <div class="col-md-5">
                        <label class="form-label fw-bold small"><i class="bi bi-funnel"></i> Mostrar</label>
                        <div class="filtro-checks">
                            <label class="filtro-check-item tipo-disponible activo" id="lbl-disponible">
                                <input type="checkbox" id="chk-disponible" checked onchange="toggleFiltroCheck('disponible')">
                                <span class="check-icon">&#10003;</span>
                                Disponibles
                            </label>
                            <label class="filtro-check-item tipo-camino" id="lbl-camino">
                                <input type="checkbox" id="chk-camino" onchange="toggleFiltroCheck('camino')">
                                <span class="check-icon">&#10003;</span>
                                En Camino
                            </label>
                            <label class="filtro-check-item tipo-pedido" id="lbl-pedido">
                                <input type="checkbox" id="chk-pedido" onchange="toggleFiltroCheck('pedido')">
                                <span class="check-icon">&#10003;</span>
                                Pedidos
                            </label>
                        </div>
                    </div>

                    <!-- Ordenar -->
                    <div class="col-md-2">
                        <label class="form-label fw-bold small"><i class="bi bi-sort-down"></i> Orden</label>
                        <select class="form-select" id="filtro-orden" onchange="filtrarCatalogo()">
                            <option value="precio-desc">Mayor precio</option>
                            <option value="precio-asc">Menor precio</option>
                            <option value="nombre">Nombre A-Z</option>
                            <option value="reciente">Recientes</option>
                        </select>
                    </div>

                    <!-- Limpiar -->
                    <div class="col-md-1">
                        <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()" title="Limpiar filtros">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Grid de productos -->
        <div class="row g-4" id="catalogo-grid"></div>

        <!-- Estado vacio -->
        <div id="catalogo-vacio" class="text-center py-5" style="display:none;">
            <div class="card p-5 shadow">
                <i class="bi bi-inbox text-muted" style="font-size:4rem;"></i>
                <h3 class="mt-3">No hay productos para mostrar</h3>
                <p class="text-muted">Ajusta los filtros o agrega productos al inventario</p>
                <a href="products.html" class="btn btn-gold mt-3"><i class="bi bi-plus-circle"></i> Agregar Productos</a>
            </div>
        </div>

        <!-- Footer impreso -->
        <div class="print-only print-footer">
            Fitoscents &mdash; Cat&aacute;logo de Perfumes &mdash; Tijuana, B.C. &mdash; <span id="print-fecha-footer"></span>
        </div>

    </div><!-- /print-wrapper -->
</div>

<!-- Modal Detalle -->
<div class="modal fade" id="modalDetalleProducto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold text-gold" id="modal-nombre"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <img id="modal-imagen" src="" class="img-fluid rounded-3 mb-3" style="max-height:300px;" alt="">
                <h4 class="fw-bold mb-3" style="color:var(--gold-flat);" id="modal-precio"></h4>
                <p class="text-muted mb-2" id="modal-marca"></p>
                <span class="badge bg-secondary" id="modal-sku"></span>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-whatsapp px-4" onclick="consultarProducto()">
                    <i class="bi bi-whatsapp"></i> Consultar por WhatsApp
                </button>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/storage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/catalogo.js"></script>
<script>
    const fechaHoy = new Date().toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });
    document.querySelectorAll('#print-fecha, #print-fecha-footer').forEach(el => el.textContent = fechaHoy);

    // Activar/desactivar checkbox visualmente
    function toggleFiltroCheck(tipo) {
        const lbl = document.getElementById('lbl-' + tipo);
        const chk = document.getElementById('chk-' + tipo);
        lbl.classList.toggle('activo', chk.checked);
        filtrarCatalogo();
    }

    function imprimirCatalogo() {
        const tip = document.createElement('div');
        tip.className = 'print-tip';
        tip.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#FFD700;color:#000;padding:12px 24px;border-radius:30px;font-weight:700;font-size:0.85rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);white-space:nowrap;';
        tip.innerHTML = '&#128161; Chrome: <b>M&aacute;s opciones</b> &rarr; activa <b>"Gr&aacute;ficos de fondo"</b> para el fondo oscuro';
        document.body.appendChild(tip);
        setTimeout(() => {
            window.print();
            setTimeout(() => tip.remove(), 2000);
        }, 350);
    }
</script>
</body>
</html>
