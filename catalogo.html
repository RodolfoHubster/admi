<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — Fitoscents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/ui.css">
    <link rel="stylesheet" href="assets/css/features.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script type="module" src="assets/js/firebase.js"></script>
    <script src="components/header.js"></script>
    <style>
        .product-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,215,0,0.03) 100%);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(255,215,0,0.2);
            border-color: rgba(255,215,0,0.55);
        }
        .product-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .product-info {
            padding: 18px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .product-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold-flat);
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .product-brand {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .product-price {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--gold-flat);
            margin-top: auto;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .badge-disponible {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,215,0,0.92);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .badge-pedido {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(30,30,40,0.92);
            color: var(--gold-flat);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            border: 1px solid rgba(255,215,0,0.4);
        }
        .filtros-catalogo .form-control,
        .filtros-catalogo .form-select {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,215,0,0.25);
            color: var(--text-primary);
        }
        .filtros-catalogo .form-control:focus,
        .filtros-catalogo .form-select .form-select:focus {
            border-color: var(--gold-flat);
            box-shadow: 0 0 0 0.2rem rgba(255,215,0,0.2);
        }
        .filtros-catalogo .form-control::placeholder { color: var(--text-secondary); }
        .filtros-catalogo .form-select option { background: #111; color: #fff; }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-whatsapp:hover {
            background: #128C7E;
            color: #fff;
            transform: scale(1.04);
            box-shadow: 0 4px 12px rgba(37,211,102,0.4);
        }
        @media print {
            body { background: white; }
            .product-card { background: white; border: 1px solid #ddd; }
            .product-name, .product-price { color: #000; }
            .no-print { display: none !important; }
            .product-card { break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container-xl my-4">

    <!-- Header -->
    <div class="card shadow-sm mb-4 no-print">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h2 class="fw-bold mb-1">
                        <i class="bi bi-gem text-gold"></i> Catálogo de Perfumes
                    </h2>
                    <p class="text-muted mb-0">
                        <span id="total-productos">0</span> productos disponibles
                    </p>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-outline-secondary" onclick="window.location.href='index.html'">
                        <i class="bi bi-arrow-left"></i> Volver
                    </button>
                    <button class="btn btn-whatsapp" onclick="compartirCatalogo()">
                        <i class="bi bi-whatsapp"></i> Compartir
                    </button>
                    <button class="btn btn-outline-secondary" onclick="window.print()">
                        <i class="bi bi-printer"></i> Imprimir
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card shadow-sm mb-4 no-print filtros-catalogo">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-bold small">
                        <i class="bi bi-search"></i> Buscar
                    </label>
                    <input type="text" class="form-control" id="buscar-catalogo"
                           placeholder="Nombre, marca..."
                           onkeyup="filtrarCatalogo()">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold small">
                        <i class="bi bi-funnel"></i> Mostrar
                    </label>
                    <select class="form-select" id="filtro-disponibilidad" onchange="filtrarCatalogo()">
                        <option value="disponibles">Solo Disponibles</option>
                        <option value="todos">Todos (incluye pedidos)</option>
                        <option value="pedidos">Solo Pedidos</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold small">
                        <i class="bi bi-sort-down"></i> Ordenar por
                    </label>
                    <select class="form-select" id="filtro-orden" onchange="filtrarCatalogo()">
                        <option value="precio-desc">Precio: Mayor a Menor</option>
                        <option value="precio-asc">Precio: Menor a Mayor</option>
                        <option value="nombre">Nombre A-Z</option>
                        <option value="reciente">Más Recientes</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                        <i class="bi bi-x-circle"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Grid -->
    <div class="row g-4" id="catalogo-grid"></div>

    <!-- Vacío -->
    <div id="catalogo-vacio" class="text-center py-5" style="display:none;">
        <div class="card p-5 shadow">
            <i class="bi bi-inbox text-muted" style="font-size:4rem;"></i>
            <h3 class="mt-3">No hay productos para mostrar</h3>
            <p class="text-muted">Ajusta los filtros o agrega productos al inventario</p>
            <a href="products.html" class="btn btn-gold mt-3">
                <i class="bi bi-plus-circle"></i> Agregar Productos
            </a>
        </div>
    </div>

</div>

<!-- Modal Detalle -->
<div class="modal fade" id="modalDetalleProducto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold text-gold" id="modal-nombre"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <img id="modal-imagen" src="" class="img-fluid rounded-3 mb-3" style="max-height:300px;">
                <h4 class="fw-bold mb-3" style="color:var(--gold-flat);" id="modal-precio"></h4>
                <p class="text-muted mb-2" id="modal-marca"></p>
                <span class="badge bg-secondary" id="modal-sku"></span>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-whatsapp px-4" onclick="consultarProducto()">
                    <i class="bi bi-whatsapp"></i> Consultar por WhatsApp
                </button>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/storage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/catalogo.js"></script>
</body>
</html>
